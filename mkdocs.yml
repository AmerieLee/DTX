site_name: DTX
site_description: Digital Technology Interactive Textbook
theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: blue
      accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.tabs.link
extra_css:
  - stylesheets/extra.css
markdown_extensions:
  - admonition
  - attr_list
  - tables
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed
nav:
  - Home: index.md
  - Grade 9:
      - Overview: grade9/index.md
      - Unit 1:
          - Overview: grade9/unit1/index.md
          - Lesson 1: grade9/unit1/lesson1.md
