<!--?xml version="1.0" encoding="UTF-8"?-->
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="650" viewBox="0 0 1100 650">

<style>

.title{
font:bold 30px Arial,Helvetica,sans-serif;
fill:#1f2937;
}

.subtitle{
font:16px Arial,Helvetica,sans-serif;
fill:#4b5563;
}

.label{
font:bold 16px Arial,Helvetica,sans-serif;
text-anchor:middle;
fill:#111827;
}

.small{
font:14px Arial,Helvetica,sans-serif;
fill:#374151;
text-anchor:middle;
}

.device{
fill:#eef6ff;
stroke:#2563eb;
stroke-width:2.5;
rx:12;
}

.cloud{
fill:#ecfeff;
stroke:#0891b2;
stroke-width:2.5;
}

.packet{
fill:#fff7ed;
stroke:#ea580c;
stroke-width:2;
rx:6;
}

.line{
stroke:#6b7280;
stroke-width:3;
}

.path{
stroke:#2563eb;
stroke-width:3;
stroke-dasharray:8 6;
fill:none;
marker-end:url(#arrow);
}

</style>

<defs>

<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">

<polygon points="0 0,8 3,0 6" fill="#2563eb"></polygon>

</marker>

</defs>

<!-- TITLE -->

<text x="550" y="40" class="title" text-anchor="middle">

How Data Travels Across a Network

</text>

<text x="550" y="70" class="subtitle" text-anchor="middle">

Large files are divided into packets before transmission.

</text>

<!-- COMPUTER -->

<rect x="70" y="240" width="160" height="90" class="device"></rect>

<text x="150" y="292" class="label">

Laptop

</text>

<!-- INTERNET -->

<ellipse cx="550" cy="285" rx="110" ry="50" class="cloud"></ellipse>

<text x="550" y="292" class="label">

Internet

</text>

<!-- SERVER -->

<rect x="870" y="240" width="170" height="90" class="device"></rect>

<text x="955" y="292" class="label">

Web Server

</text>

<!-- MAIN LINES -->

<line x1="230" y1="285" x2="440" y2="285" class="line"></line>

<line x1="660" y1="285" x2="870" y2="285" class="line"></line>

<!-- PACKETS -->

<rect x="280" y="250" width="45" height="30" class="packet"></rect>

<text x="302" y="270" class="small">

P1

</text>

<rect x="355" y="305" width="45" height="30" class="packet"></rect>

<text x="377" y="325" class="small">

P2

</text>

<rect x="510" y="205" width="45" height="30" class="packet"></rect>

<text x="532" y="225" class="small">

P3

</text>

<rect x="640" y="345" width="45" height="30" class="packet"></rect>

<text x="662" y="365" class="small">

P4

</text>

<rect x="760" y="250" width="45" height="30" class="packet"></rect>

<text x="782" y="270" class="small">

P5

</text>

<!-- PATHS -->

<path d="M230 285
         C300 250,
         340 240,
         440 285" class="path"></path>

<path d="M230 285
         C320 330,
         360 360,
         440 285" class="path"></path>

<path d="M660 285
         C720 210,
         790 210,
         870 285" class="path"></path>

<path d="M660 285
         C730 350,
         790 360,
         870 285" class="path"></path>

<!-- STEP BOXES -->

<rect x="70" y="470" width="180" height="80" class="device"></rect>

<text x="160" y="505" class="label">

1

</text>

<text x="160" y="530" class="small">

File Created

</text>

<rect x="290" y="470" width="180" height="80" class="device"></rect>

<text x="380" y="505" class="label">

2

</text>

<text x="380" y="530" class="small">

Split into Packets

</text>

<rect x="510" y="470" width="180" height="80" class="device"></rect>

<text x="600" y="505" class="label">

3

</text>

<text x="600" y="530" class="small">

Travel Independently

</text>

<rect x="730" y="470" width="180" height="80" class="device"></rect>

<text x="820" y="505" class="label">

4

</text>

<text x="820" y="530" class="small">

Reassembled

</text>

<!-- FOOTER -->

<text x="550" y="610" class="subtitle" text-anchor="middle">

Packets may take different routes but arrive at the same destination.

</text>

</svg>