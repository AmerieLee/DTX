<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="700" viewBox="0 0 1400 700">

  <defs>

    <style>

      .title{
        font:bold 34px Arial, sans-serif;
        fill:#1f2937;
      }

      .subtitle{
        font:18px Arial, sans-serif;
        fill:#4b5563;
      }

      .box{
        fill:white;
        stroke:#2563EB;
        stroke-width:3;
        rx:18;
        ry:18;
      }

      .browser{
        fill:#DBEAFE;
      }

      .dns{
        fill:#FEF3C7;
        stroke:#D97706;
      }

      .server{
        fill:#DCFCE7;
        stroke:#16A34A;
      }

      .display{
        fill:#F3F4F6;
        stroke:#6B7280;
      }

      .step{
        font:bold 18px Arial,sans-serif;
        fill:#111827;
      }

      .label{
        font:bold 22px Arial,sans-serif;
        fill:#111827;
      }

      .text{
        font:17px Arial,sans-serif;
        fill:#374151;
      }

      .note{
        font:16px Arial,sans-serif;
        fill:#374151;
      }

      .arrow{
        stroke:#2563EB;
        stroke-width:3;
        fill:none;
        marker-end:url(#arrowHead);
      }

    </style>

    <marker id="arrowHead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#2563EB"></path>
    </marker>

  </defs>

  <!-- Title -->

  <text x="700" y="55" text-anchor="middle" class="title">
    How a Web Page Loads
  </text>

  <text x="700" y="90" text-anchor="middle" class="subtitle">
    From typing a URL to viewing a webpage
  </text>

  <!-- STEP 1 -->

  <rect x="50" y="180" width="220" height="180" class="box browser"></rect>

  <text x="160" y="215" text-anchor="middle" class="label">
    1. Browser
  </text>

  <text x="160" y="255" text-anchor="middle" class="text">
    User types
  </text>

  <text x="160" y="290" text-anchor="middle" class="text">
    www.example.com
  </text>

  <!-- STEP 2 -->

  <rect x="340" y="180" width="220" height="180" class="box dns"></rect>

  <text x="450" y="215" text-anchor="middle" class="label">
    2. DNS
  </text>

  <text x="450" y="255" text-anchor="middle" class="text">
    Finds the
  </text>

  <text x="450" y="290" text-anchor="middle" class="text">
    IP Address
  </text>

  <!-- STEP 3 -->

  <rect x="630" y="180" width="220" height="180" class="box server"></rect>

  <text x="740" y="215" text-anchor="middle" class="label">
    3. Web Server
  </text>

  <text x="740" y="255" text-anchor="middle" class="text">
    Browser sends
  </text>

  <text x="740" y="290" text-anchor="middle" class="text">
    Request
  </text>

  <!-- STEP 4 -->

  <rect x="920" y="180" width="220" height="180" class="box server"></rect>

  <text x="1030" y="215" text-anchor="middle" class="label">
    4. Server
  </text>

  <text x="1030" y="255" text-anchor="middle" class="text">
    Sends
  </text>

  <text x="1030" y="290" text-anchor="middle" class="text">
    Webpage Files
  </text>

  <!-- STEP 5 -->

  <rect x="1210" y="180" width="150" height="180" class="box display"></rect>

  <text x="1285" y="215" text-anchor="middle" class="label">
    5. Display
  </text>

  <text x="1285" y="260" text-anchor="middle" class="text">
    Browser
  </text>

  <text x="1285" y="290" text-anchor="middle" class="text">
    Shows
  </text>

  <text x="1285" y="320" text-anchor="middle" class="text">
    Webpage
  </text>

  <!-- Arrows -->

  <line x1="270" y1="270" x2="340" y2="270" class="arrow"></line>

  <line x1="560" y1="270" x2="630" y2="270" class="arrow"></line>

  <line x1="850" y1="270" x2="920" y2="270" class="arrow"></line>

  <line x1="1140" y1="270" x2="1210" y2="270" class="arrow"></line>

  <!-- Bottom Process -->

  <rect x="120" y="455" width="1160" height="170" rx="18" fill="#F9FAFB" stroke="#9CA3AF" stroke-width="2"></rect>

  <text x="700" y="495" text-anchor="middle" class="label">
    Complete Process
  </text>

  <text x="700" y="535" text-anchor="middle" class="note">
    URL → DNS Lookup → IP Address → Request → Server Response → Browser Displays Page
  </text>

  <text x="700" y="575" text-anchor="middle" class="note">
    This entire process usually happens in less than one second.
  </text>

</svg>