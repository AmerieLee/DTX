<!--?xml version="1.0" encoding="UTF-8"?-->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">

<style>

.title{
font:bold 32px Arial,Helvetica,sans-serif;
fill:#1f2937;
}

.subtitle{
font:17px Arial,Helvetica,sans-serif;
fill:#4b5563;
}

.heading{
font:bold 18px Arial,Helvetica,sans-serif;
fill:#111827;
text-anchor:middle;
}

.label{
font:bold 15px Arial,Helvetica,sans-serif;
fill:#111827;
text-anchor:middle;
}

.small{
font:13px Arial,Helvetica,sans-serif;
fill:#374151;
text-anchor:middle;
}

.cloud{
fill:#ecfeff;
stroke:#0891b2;
stroke-width:3;
}

.router{
fill:#fff7ed;
stroke:#ea580c;
stroke-width:2.5;
rx:12;
}

.switch{
fill:#eef6ff;
stroke:#2563eb;
stroke-width:2.5;
rx:12;
}

.server{
fill:#ecfdf5;
stroke:#059669;
stroke-width:2.5;
rx:12;
}

.device{
fill:#ffffff;
stroke:#6b7280;
stroke-width:2;
rx:10;
}

.room{
fill:#fafafa;
stroke:#d1d5db;
stroke-width:2;
rx:16;
}

.line{
stroke:#4b5563;
stroke-width:3;
}

.dashed{
stroke:#9ca3af;
stroke-width:2;
stroke-dasharray:7 6;
}

</style>

<!-- TITLE -->

<text x="600" y="45" class="title" text-anchor="middle">

Typical School Computer Network

</text>

<text x="600" y="75" class="subtitle" text-anchor="middle">

Example of how devices communicate inside a school

</text>

<!-- INTERNET -->

<ellipse cx="600" cy="130" rx="120" ry="45" class="cloud"></ellipse>

<text x="600" y="137" class="heading">

Internet

</text>

<!-- ROUTER -->

<rect x="530" y="215" width="140" height="60" class="router"></rect>

<text x="600" y="250" class="label">

Router

</text>

<!-- CORE SWITCH -->

<rect x="520" y="330" width="160" height="60" class="switch"></rect>

<text x="600" y="365" class="label">

Core Switch

</text>

<!-- SERVER -->

<rect x="900" y="330" width="180" height="70" class="server"></rect>

<text x="990" y="360" class="label">

School Server

</text>

<text x="990" y="380" class="small">

Files / Login / Printing

</text>

<!-- CONNECTIONS -->

<line x1="600" y1="175" x2="600" y2="215" class="line"></line>

<line x1="600" y1="275" x2="600" y2="330" class="line"></line>

<line x1="680" y1="360" x2="900" y2="360" class="line"></line>

<!-- CLASSROOMS -->

<rect x="60" y="470" width="300" height="220" class="room"></rect>

<text x="210" y="500" class="heading">

Computer Lab

</text>

<rect x="90" y="540" width="80" height="45" class="device"></rect>
<text x="130" y="568" class="small">PC 1</text>

<rect x="190" y="540" width="80" height="45" class="device"></rect>
<text x="230" y="568" class="small">PC 2</text>

<rect x="90" y="610" width="80" height="45" class="device"></rect>
<text x="130" y="638" class="small">PC 3</text>

<rect x="190" y="610" width="80" height="45" class="device"></rect>
<text x="230" y="638" class="small">PC 4</text>

<rect x="430" y="470" width="340" height="220" class="room"></rect>

<text x="600" y="500" class="heading">

Classroom

</text>

<rect x="470" y="540" width="90" height="45" class="device"></rect>
<text x="515" y="568" class="small">Teacher PC</text>

<rect x="600" y="540" width="90" height="45" class="device"></rect>
<text x="645" y="568" class="small">Printer</text>

<rect x="535" y="610" width="120" height="45" class="device"></rect>

<text x="595" y="638" class="small">

Wi-Fi AP

</text>

<rect x="840" y="470" width="300" height="220" class="room"></rect>

<text x="990" y="500" class="heading">

Library

</text>

<rect x="880" y="540" width="80" height="45" class="device"></rect>
<text x="920" y="568" class="small">Laptop</text>

<rect x="980" y="540" width="80" height="45" class="device"></rect>
<text x="1020" y="568" class="small">Tablet</text>

<rect x="930" y="610" width="120" height="45" class="device"></rect>

<text x="990" y="638" class="small">

Study PCs

</text>

<!-- DOWN LINKS -->

<line x1="600" y1="390" x2="210" y2="470" class="dashed"></line>

<line x1="600" y1="390" x2="600" y2="470" class="dashed"></line>

<line x1="600" y1="390" x2="990" y2="470" class="dashed"></line>

<!-- LEGEND -->

<rect x="60" y="715" width="1080" height="30" fill="#f9fafb" stroke="#d1d5db"></rect>

<text x="120" y="735" class="small">Internet</text>
<text x="300" y="735" class="small">Router connects different networks</text>
<text x="600" y="735" class="small">Switch connects devices inside the school</text>
<text x="940" y="735" class="small">Server provides shared services</text>

</svg>