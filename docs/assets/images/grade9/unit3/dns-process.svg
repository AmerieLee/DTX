<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">

  <defs>

    <style>
      .title { font: bold 30px Arial, sans-serif; fill:#1f2937; }
      .subtitle { font:18px Arial, sans-serif; fill:#4b5563; }

      .label { font:bold 20px Arial, sans-serif; fill:#111827; }
      .text { font:17px Arial, sans-serif; fill:#374151; }

      .client { fill:#DBEAFE; stroke:#2563EB; stroke-width:3; }
      .dns { fill:#FEF3C7; stroke:#D97706; stroke-width:3; }
      .server { fill:#DCFCE7; stroke:#16A34A; stroke-width:3; }

      .arrowBlue{
        stroke:#2563EB;
        stroke-width:3;
        fill:none;
        marker-end:url(#arrowBlue);
      }

      .arrowGreen{
        stroke:#16A34A;
        stroke-width:3;
        fill:none;
        marker-end:url(#arrowGreen);
      }

      .step{
        font:bold 18px Arial,sans-serif;
        fill:#111827;
      }
    </style>

    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#2563EB"></path>
    </marker>

    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#16A34A"></path>
    </marker>

  </defs>

  <!-- Title -->

  <text x="600" y="45" text-anchor="middle" class="title">
    How DNS Finds a Website
  </text>

  <text x="600" y="78" text-anchor="middle" class="subtitle">
    Domain Name System (DNS) translates a website name into an IP address.
  </text>

  <!-- Browser -->

  <rect x="60" y="180" width="220" height="180" rx="15" class="client"></rect>

  <text x="170" y="220" text-anchor="middle" class="label">
    Browser
  </text>

  <text x="170" y="255" text-anchor="middle" class="text">
    User enters
  </text>

  <text x="170" y="285" text-anchor="middle" class="text">
    www.example.com
  </text>

  <!-- DNS -->

  <rect x="490" y="180" width="220" height="180" rx="15" class="dns"></rect>

  <text x="600" y="220" text-anchor="middle" class="label">
    DNS Server
  </text>

  <text x="600" y="255" text-anchor="middle" class="text">
    Looks up
  </text>

  <text x="600" y="285" text-anchor="middle" class="text">
    IP Address
  </text>

  <!-- Web Server -->

  <rect x="920" y="180" width="220" height="180" rx="15" class="server"></rect>

  <text x="1030" y="220" text-anchor="middle" class="label">
    Web Server
  </text>

  <text x="1030" y="255" text-anchor="middle" class="text">
    IP:
  </text>

  <text x="1030" y="285" text-anchor="middle" class="text">
    203.0.113.25
  </text>

  <!-- Arrow 1 -->

  <line x1="280" y1="235" x2="490" y2="235" class="arrowBlue"></line>

  <text x="385" y="215" text-anchor="middle" class="step">
    1. Ask DNS
  </text>

  <!-- Arrow 2 -->

  <line x1="710" y1="305" x2="280" y2="305" class="arrowGreen"></line>

  <text x="495" y="335" text-anchor="middle" class="step">
    2. Return IP Address
  </text>

  <!-- Arrow 3 -->

  <line x1="280" y1="120" x2="920" y2="120" class="arrowBlue"></line>

  <line x1="920" y1="120" x2="920" y2="180" class="arrowBlue"></line>

  <text x="610" y="105" text-anchor="middle" class="step">
    3. Browser Connects to the Web Server
  </text>

  <!-- Bottom Summary -->

  <rect x="170" y="430" width="860" height="110" rx="12" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="2"></rect>

  <text x="600" y="470" text-anchor="middle" class="label">
    DNS does NOT store websites.
  </text>

  <text x="600" y="505" text-anchor="middle" class="text">
    DNS only tells your browser which IP address belongs to a website.
  </text>

</svg>