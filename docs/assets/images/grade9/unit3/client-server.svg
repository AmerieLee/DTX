<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500">
  <defs>
    <style>
      .title { font: bold 28px Arial, sans-serif; fill: #1f2937; }
      .subtitle { font: 18px Arial, sans-serif; fill: #374151; }
      .label { font: bold 20px Arial, sans-serif; fill: #111827; }
      .text { font: 17px Arial, sans-serif; fill: #374151; }
      .small { font: 15px Arial, sans-serif; fill: #4b5563; }
      .boxClient { fill: #dbeafe; stroke: #2563eb; stroke-width: 3; rx: 12; ry: 12; }
      .boxServer { fill: #dcfce7; stroke: #16a34a; stroke-width: 3; rx: 12; ry: 12; }
      .arrow { stroke: #374151; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>

    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#374151"></path>
    </marker>
  </defs>

  <text x="450" y="45" text-anchor="middle" class="title">
    Client–Server Communication
  </text>

  <text x="450" y="78" text-anchor="middle" class="subtitle">
    The client requests information. The server provides information.
  </text>

  <!-- Client -->
  <rect x="90" y="150" width="250" height="220" class="boxClient"></rect>

  <text x="215" y="185" text-anchor="middle" class="label">
    CLIENT
  </text>

  <text x="215" y="220" text-anchor="middle" class="text">
    Laptop
  </text>

  <text x="215" y="250" text-anchor="middle" class="text">
    Tablet
  </text>

  <text x="215" y="280" text-anchor="middle" class="text">
    Smartphone
  </text>

  <text x="215" y="330" text-anchor="middle" class="small">
    Sends requests
  </text>

  <!-- Server -->
  <rect x="560" y="150" width="250" height="220" class="boxServer"></rect>

  <text x="685" y="185" text-anchor="middle" class="label">
    SERVER
  </text>

  <text x="685" y="220" text-anchor="middle" class="text">
    Website
  </text>

  <text x="685" y="250" text-anchor="middle" class="text">
    Database
  </text>

  <text x="685" y="280" text-anchor="middle" class="text">
    Cloud Service
  </text>

  <text x="685" y="330" text-anchor="middle" class="small">
    Sends responses
  </text>

  <!-- Request Arrow -->
  <line x1="340" y1="210" x2="560" y2="210" class="arrow"></line>
  <text x="450" y="195" text-anchor="middle" class="label">
    Request
  </text>

  <!-- Response Arrow -->
  <line x1="560" y1="300" x2="340" y2="300" stroke="#374151" stroke-width="3" marker-end="url(#arrow)"></line>
  <text x="450" y="325" text-anchor="middle" class="label">
    Response
  </text>

  <!-- Bottom Note -->
  <text x="450" y="445" text-anchor="middle" class="subtitle">
    Examples: Web Browsing • Google Classroom • YouTube • Netflix
  </text>

  <text x="450" y="472" text-anchor="middle" class="small">
    A client requests information. A server receives the request and sends the requested data back.
  </text>
</svg>