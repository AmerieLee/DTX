<!DOCTYPE html>
<html lang="ko">
<head>

  <title>ICT 교재 플랫폼</title>

  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>
<body>
  <div id="app">💡 교재 플랫폼을 불러오는 중입니다...</div>

      homepage: 'README.md'     // 첫 화면으로 보여줄 마크다운 파일명
    }
  </script>
  <!-- Docsify 필수 스크립트 -->
